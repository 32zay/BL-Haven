<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Submit Story | BL Haven</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background-color: #0f0f0f;
      color: #f2eaea;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #141414;
      box-shadow: 0 0 10px #000;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: crimson;
      text-shadow: 0 0 6px crimson;
    }

    nav a {
      margin-left: 18px;
      text-decoration: none;
      color: #f2eaea;
      font-size: 14px;
    }

    nav a:hover {
      color: crimson;
    }

    .submit-container {
      max-width: 800px;
      margin: 60px auto;
      padding: 30px;
      background: #161616;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    h2 {
      text-align: center;
      color: crimson;
      text-shadow: 0 0 6px crimson;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-top: 18px;
      font-size: 14px;
      color: #ccc;
    }

    input, textarea, select {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 6px;
      color: #f2eaea;
      font-size: 14px;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      background: crimson;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 0 12px crimson;
      transition: 0.3s ease;
    }

    button:hover {
      background: #4b004b;
      box-shadow: 0 0 18px #4b004b;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">BL Haven</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="browse.html">Browse</a>
    <a href="submit.html">Submit</a>
    <a href="forum.html">Forum</a>
    <a href="about.html">About</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
  </nav>
</header>

<div class="submit-container">
  <h2>Submit Your Story</h2>

  <form>
    <label for="title">Story Title</label>
    <input type="text" id="title" placeholder="Enter your story title">

    <label for="genre">Genre</label>
    <select id="genre">
      <option>Dark Romance</option>
      <option>Psychological</option>
      <option>Fantasy</option>
      <option>Historical</option>
      <option>Modern BL</option>
    </select>

    <label for="summary">Short Summary</label>
    <textarea id="summary" placeholder="Hook the readers…"></textarea>

    <label for="content">Story Content</label>
    <textarea id="content" placeholder="Write your story here…"></textarea>

    <button type="submit">Submit to BL Haven</button>
  </form>
</div>

<footer>
  © 2025 BL Haven — Where Shadows Tell Stories
</footer>

</body>
</html>
