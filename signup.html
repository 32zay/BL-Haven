<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BL Shadows — Sign Up</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      color: #ddd;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      padding: 20px;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: saturate(180%) blur(8px);
      border-bottom: 1px solid #4b004b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      z-index: 100;
    }

    header .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #b30000;
      letter-spacing: 3px;
      cursor: default;
    }

    nav a {
      margin-left: 25px;
      font-weight: 600;
      font-size: 1rem;
      color: #ddd;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #b30000;
    }

    .signup-container {
      background: #121212;
      border: 1px solid #4b004b;
      padding: 40px 35px;
      border-radius: 15px;
      box-shadow: 0 0 15px #b30000;
      width: 100%;
      max-width: 420px;
      margin-top: 100px;
    }

    .signup-container h2 {
      font-family: 'Playfair Display', serif;
      color: #b30000;
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: 3px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 1rem;
      color: #e94b4b;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #4b004b;
      background-color: #1e1e1e;
      color: #ddd;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #b30000;
      box-shadow: 0 0 8px #b30000;
      background-color: #2a0a0a;
    }

    .btn-signup {
      width: 100%;
      background-color: #b30000;
      border: none;
      padding: 14px;
      border-radius: 30px;
      color: #f0e6e6;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 0 12px #b30000;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-signup:hover {
      background-color: #4b004b;
      box-shadow: 0 0 18px #4b004b;
    }

    .login-text {
      margin-top: 18px;
      font-size: 0.9rem;
      text-align: center;
      color: #777;
    }

    .login-text a {
      color: #b30000;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .login-text a:hover {
      color: #4b004b;
    }

    /* Age Modal Styles */
    #ageModal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #ageModal .modal-content {
      background: #121212;
      border: 2px solid #b30000;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 0 20px #b30000;
      color: #ddd;
    }

    #ageModal input[type="number"] {
      width: 60px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #4b004b;
      background-color: #1e1e1e;
      color: #ddd;
      font-size: 1rem;
      text-align: center;
      margin-right: 10px;
    }

    #ageModal button {
      padding: 10px 20px;
      background-color: #b30000;
      border: none;
      border-radius: 25px;
      color: #f0e6e6;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 0 10px #b30000;
      transition: all 0.3s ease;
    }

    #ageModal button:hover {
      background-color: #4b004b;
      box-shadow: 0 0 15px #4b004b;
    }
  </style>
</head>

<body>

  <!-- Age Restriction Modal -->
  <div id="ageModal">
    <div class="modal-content">
      <h2>⚠️ Age Verification</h2>
      <p>You must be 16 years or older to sign up.</p>
      <input type="number" id="ageInput" placeholder="Enter age" min="0" />
      <button id="verifyAgeBtn">Enter</button>
    </div>
  </div>

  <header>
    <div class="logo">BL Shadows</div>
    <nav>
      <a href="index.html">Homepage</a>
      <a href="browse.html">Browse</a>
      <a href="submit.html">Submit</a>
      <a href="forum.html">Forum</a>
      <a href="about.html">About</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Sign Up</a>
    </nav>
  </header>

  <div class="signup-container">
    <h2>Create Account</h2>
    <form action="#" method="POST" id="signupForm">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Choose a username" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Create a password" required />

      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your password" required />

      <button type="submit" class="btn-signup">Sign Up</button>
    </form>

    <p class="login-text">
      Already have an account? <a href="login.html">Log in here</a>
    </p>
  </div>

  <script>
    // Age Verification Logic
    const modal = document.getElementById('ageModal');
    const verifyBtn = document.getElementById('verifyAgeBtn');
    const ageInput = document.getElementById('ageInput');

    verifyBtn.addEventListener('click', () => {
      const age = parseInt(ageInput.value);
      if (!age || age < 16) {
        alert("Sorry! You must be 16 or older to sign up.");
        return;
      }
      // Hide modal if age is valid
      modal.style.display = 'none';
    });

    // Optional: Press Enter to verify
    ageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifyBtn.click();
    });
  </script>

</body>
</html>
